name: Build Android APK

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Link node_modules into android
        run: ln -s ${{ github.workspace }}/node_modules ${{ github.workspace }}/android/node_modules

      - name: Fix Gradle permissions
        run: chmod +x android/gradlew

      - name: Build Release APK
        run: cd android && ./gradlew assembleRelease --no-daemon --warning-mode none -Dorg.gradle.jvmargs="-Xmx4g"
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: again-school-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk

  build-debug:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Link node_modules into android
        run: ln -s ${{ github.workspace }}/node_modules ${{ github.workspace }}/android/node_modules

      - name: Fix Gradle permissions
        run: chmod +x android/gradlew

      - name: Build Debug APK
        run: cd android && ./gradlew assembleDebug --no-daemon --warning-mode none -Dorg.gradle.jvmargs="-Xmx4g"
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: again-school-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
