name: Build Android APK

on:
  push:
    branches: [ master ]
  workflow_dispatch:

env:
  NODE_OPTIONS: "--max-old-space-size=4096"
  EXPO_USE_COMMUNITY_AUTOLINKING: "1"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Fix Gradle permissions
        run: chmod +x android/gradlew

      - name: Generate package list
        run: npx react-native config > /dev/null 2>&1 || true

      - name: Build Release APK
        run: |
          export ANDROID_HOME=$ANDROID_SDK_ROOT
          cd android && ./gradlew assembleRelease \
            --no-daemon \
            --warning-mode none \
            -Dorg.gradle.jvmargs="-Xmx4g" \
            -Preact.internal.publishingGroup=com.facebook
        env:
          NODE_ENV: "production"

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: again-school-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk

  build-debug:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Fix Gradle permissions
        run: chmod +x android/gradlew

      - name: Generate package list
        run: npx react-native config > /dev/null 2>&1 || true

      - name: Build Debug APK
        run: |
          export ANDROID_HOME=$ANDROID_SDK_ROOT
          cd android && ./gradlew assembleDebug \
            --no-daemon \
            --warning-mode none \
            -Dorg.gradle.jvmargs="-Xmx4g"
        env:
          NODE_ENV: "development"

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: again-school-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
