name: Dev Client Build (Android)

on:
  workflow_dispatch:

jobs:
  build:
    name: Build Dev Client APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Prebuild Android (Dev Client)
        run: npx expo prebuild --platform android --clean

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/again-school.keystore

      - name: Build Debug APK (Dev Client)
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload Dev Client APK
        uses: actions/upload-artifact@v4
        with:
          name: again-school-dev-client.apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Done
        run: echo "✅ Dev Client APK 빌드 완료! Artifacts에서 다운로드하세요."
