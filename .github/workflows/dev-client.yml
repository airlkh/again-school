name: Dev Client Build (Android)

on:
  workflow_dispatch:

jobs:
  build:
    name: Build Dev Client APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Build Dev Client APK
        run: eas build --platform android --profile development --non-interactive

      - name: Get build URL
        run: eas build:list --platform android --limit 1
